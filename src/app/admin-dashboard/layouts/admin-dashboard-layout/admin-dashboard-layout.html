<div class="bg-base-200 min-h-screen flex">

  <!-- Sidebar -->
  <aside class="bg-base-300 w-64 min-h-screen fixed left-0 top-0 flex flex-col z-10">

    <!-- Logo -->
    <div class="px-6 py-5 border-b border-base-content/10">
      <h1 routerLink="/" class="text-2xl font-bold cursor-pointer">
        Teslo<span class="text-accent"> | Shop</span>
      </h1>
      <p class="text-base-content/40 text-sm mt-1">Panel de administración</p>
    </div>

    <!-- Profile -->
    <div class="px-6 py-6 border-b border-base-content/10">
      <p class="text-base-content/40 text-sm mb-1">Bienvenido,</p>
      <span class="font-bold text-base-content">{{ user()?.fullName }}</span>
    </div>

    <!-- Nav -->
    <nav class="flex flex-col flex-1 px-4 py-4 gap-1">
      <a routerLink="/admin/dashboard" routerLinkActive="bg-accent/20 text-accent"
        [routerLinkActiveOptions]="{ exact: true }"
        class="flex items-center gap-3 px-3 py-3 rounded-lg hover:bg-base-content/5 transition-colors duration-150">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
          stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z" />
        </svg>
        <div class="flex flex-col">
          <span class="font-bold leading-5">Dashboard</span>
          <span class="text-xs text-base-content/40">Resumen general</span>
        </div>
      </a>

      <a routerLink="/admin/products" routerLinkActive="bg-accent/20 text-accent"
        class="flex items-center gap-3 px-3 py-3 rounded-lg hover:bg-base-content/5 transition-colors duration-150">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
          stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M20.25 6.375c0 2.278-3.694 4.125-8.25 4.125S3.75 8.653 3.75 6.375m16.5 0c0-2.278-3.694-4.125-8.25-4.125S3.75 4.097 3.75 6.375m16.5 0v11.25c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125V6.375m16.5 0v3.75m-16.5-3.75v3.75m16.5 0v3.75C20.25 16.153 16.556 18 12 18s-8.25-1.847-8.25-4.125v-3.75m16.5 0c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125" />
        </svg>
        <div class="flex flex-col">
          <span class="font-bold leading-5">Productos</span>
          <span class="text-xs text-base-content/40">Lista de productos</span>
        </div>
      </a>
    </nav>

    <!-- Logout -->
    <div class="px-4 py-4 border-t border-base-content/10">
      <button class="btn btn-ghost text-error w-full" (click)="logout()">
        Cerrar Sesión
      </button>
    </div>

  </aside>

  <!-- Content -->
  <main class="ml-64 flex-1 p-6">
    <router-outlet />
  </main>

</div>
