<!-- Header -->
<div class="flex justify-between items-center">
  <h1 class="text-2xl font-bold">{{ product().title }}</h1>
  <button class="btn btn-secondary" form="productForm" type="submit">
    Guardar
  </button>
</div>
<div class="divider"></div>

<form
  id="productForm"
  [formGroup]="producForm"
  class="grid grid-cols-1 sm:grid-cols-2 gap-6"
  (ngSubmit)="onSubmit()"
>
  <!-- Columna izquierda -->
  <div class="flex flex-col gap-3">
    <h2 class="text-xl font-bold border-b border-base-300 pb-2">Datos generales</h2>

    <input type="text" placeholder="Título"
      class="input input-bordered w-full"
      formControlName="title"
      [class.border-red-500]="producForm.get('title')?.errors ?? false" />
    <form-error-label [control]="producForm.get('title')!" />

    <input type="text" placeholder="Slug"
      class="input input-bordered w-full"
      formControlName="slug"
      [class.border-red-500]="producForm.get('slug')?.errors ?? false" />
    <form-error-label [control]="producForm.get('slug')!" />

    <textarea class="textarea textarea-bordered w-full" placeholder="Descripción"
      rows="6" formControlName="description"
      [class.border-red-500]="producForm.get('description')?.errors ?? false">
    </textarea>
    <form-error-label [control]="producForm.get('description')!" />

    <h3 class="text-base font-semibold mt-1">Datos de venta</h3>
    <div class="grid grid-cols-2 gap-2">
      <div>
        <input type="number" placeholder="Precio"
          class="input input-bordered w-full"
          formControlName="price"
          [class.border-red-500]="producForm.get('price')?.errors ?? false" />
        <form-error-label [control]="producForm.get('price')!" />
      </div>
      <div>
        <input type="number" placeholder="Inventario"
          class="input input-bordered w-full"
          formControlName="stock"
          [class.border-red-500]="producForm.get('stock')?.errors ?? false" />
        <form-error-label [control]="producForm.get('stock')!" />
      </div>
    </div>

    <input type="text" placeholder="Tags"
      class="input input-bordered w-full"
      formControlName="tags"
      [class.border-red-500]="producForm.get('tags')?.errors ?? false" />
    <form-error-label [control]="producForm.get('tags')!" />

    <div class="grid grid-cols-4 gap-2">
      <button type="button" class="btn btn-sm"
        [class.btn-primary]="producForm.value.gender === 'men'"
        (click)="producForm.patchValue({ gender: 'men' })">Masculino</button>
      <button type="button" class="btn btn-sm"
        [class.btn-accent]="producForm.value.gender === 'women'"
        (click)="producForm.patchValue({ gender: 'women' })">Femenino</button>
      <button type="button" class="btn btn-sm"
        [class.btn-warning]="producForm.value.gender === 'kid'"
        (click)="producForm.patchValue({ gender: 'kid' })">Kid</button>
      <button type="button" class="btn btn-sm"
        [class.btn-secondary]="producForm.value.gender === 'unisex'"
        (click)="producForm.patchValue({ gender: 'unisex' })">Unisex</button>
    </div>

    <div class="grid grid-cols-6 gap-2">
      @for (size of sizes; track size) {
        <button class="btn btn-sm" type="button"
          (click)="onSizeClicked(size)"
          [class.btn-accent]="producForm.value.sizes?.includes(size)">
          {{ size }}
        </button>
      }
    </div>
  </div>

  <!-- Columna derecha -->
  <div class="flex flex-col gap-3">
    <h2 class="text-xl font-bold border-b border-base-300 pb-2">Imágenes</h2>

    <product-carousel [images]="imagesToCarrusel()" />

    <input type="file" accept="image/*" multiple
      class="file-input file-input-bordered w-full"
      (change)="onFilesChanged($event)" />

    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
      @for (image of tempImages(); track image) {
        <img [src]="image" alt="Temporal image"
          class="w-full object-cover rounded-xl aspect-square" />
      }
    </div>
  </div>
</form>

@if (wasSaved()) {
  <div class="alert alert-success fixed bottom-4 right-4 w-80 animate-premium-in">
    <span>Datos actualizados correctamente</span>
  </div>
}
